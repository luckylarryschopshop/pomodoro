<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pomodoro</title><style>body{background:#121212;color:#fff;font-family:sans-serif;text-align:center;padding:20px}#timer{font-size:5rem;margin:20px}#progress{width:200px;height:200px;margin:20px;border-radius:50%;background:conic-gradient(#4caf50 var(--progress),#2e2e2e 0)}#buttons{margin:20px}button{margin:5px;padding:10px 20px;font-size:1rem}#session{font-size:1.2rem}</style></head><body><div id="timer">25:00</div><div id="progress" style="--progress:100%"></div><div id="buttons"><button onclick="startPause()">Start</button><button onclick="reset()">Reset</button></div><div id="session">Sessions: 0</div><audio id="beep" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"></audio><script>let timer, session=0, isWork=true, time=25*60;function update() {document.getElementById('timer').textContent=Math.floor(time/60).toString().padStart(2,'0')+':'+(time%60).toString().padStart(2,'0');document.getElementById('progress').style.setProperty('--progress', (time/(isWork?25:5)*60)*100+'%')};function startPause() {if(!timer) {timer=setInterval(() => {time--;update();if(time<=0) {document.getElementById('beep').play();time=isWork?5*60:25*60;isWork=!isWork;session++;document.getElementById('session').textContent='Sessions: '+session}}},1000)}};function reset() {clearInterval(timer);timer=null;time=isWork?25*60:5*60;isWork=true;session=0;update()}</script></body></html>
